id: government_sens
industry: government
primary_sensitivity: "实施时间线和向上级汇报的可见性——领导关注'什么时候能看到效果'和'能汇报什么'"
secondary_sensitivities:
  - "预算金额——政务项目预算审批流程长，需要精确的预算分解"
  - "合规对标——等保/密评/关保等合规要求是底线"
  - "透明度和可审计性——所有安全数据必须可导出、可汇报、可追溯"
landmines:
  - "不能否定前任的安全投资决策——用'在现有基础上增强'而非'之前的方案有问题'"
  - "不要用'帮您过检'这种说法——用'建立持续的安全管理能力'"
  - "不要催决策——政务项目有严格的审批流程，催只会让人反感"
  - "不要只讲技术不讲管理——政务安全的核心是管理驱动而非技术驱动"
empathy_phrases:
  - "政务云管理80个委办局的安全确实不容易，需要一套让各方都能配合的机制"
  - "领导需要的是一个清晰的进度看板，知道每件事做到什么程度了"
  - "我们理解政务项目从立项到验收有严格的流程，方案会完全配合这个节奏"
