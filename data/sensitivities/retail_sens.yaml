id: retail_sens
industry: retail
primary_sensitivity: "不能影响销售——安全方案必须对交易流程和客户体验零感知"
secondary_sensitivities:
  - "支付安全（PCI DSS合规）——但要用业务语言而非合规语言沟通"
  - "客户隐私保护——数据泄露会直接导致客户流失和品牌声誉损失"
  - "投入产出比——零售行业利润薄，每一笔投入都要算得过来"
landmines:
  - "不要在促销季（618/双11）部署新安全设备——业务连续性第一"
  - "不要否定已有的安全投资——强调'让现有设备更好用'"
  - "不要用恐吓式营销（'不买就会被攻击'）——用'让安全投资发挥更大价值'"
  - "不要在门店营业时段做安全操作——必须在营业窗口外进行"
empathy_phrases:
  - "零售行业利润薄，安全投入必须算得过来账"
  - "线上线下融合的业务模式确实让安全变得更复杂了"
  - "您的客户信任您的品牌，安全是保护这份信任的基础"
