id: education_sens
industry: education
primary_sensitivity: "预算/性价比——教育行业预算有限，必须证明投入产出比"
secondary_sensitivities:
  - "合规（等保）——是刚需但通常不是最紧急的"
  - "不能影响教学系统运行——选课/考试/在线教学不能中断"
  - "运维难度——IT团队通常很小（2-5人），方案必须简单易用"
landmines:
  - "不要推荐需要专职人员运维的复杂方案——小团队用不了"
  - "不要在学期中间部署影响教学系统的方案——寒暑假是窗口"
  - "不要忽视预算现实——教育行业的采购流程通常需要公开招标"
  - "不要用企业级方案的价格吓退客户——需要轻量化/教育优惠版本"
empathy_phrases:
  - "学校IT团队人少事多，安全方案必须简单到'买了就能用'"
  - "教育行业预算确实有限，我们帮您把有限的钱花在刀刃上"
  - "学生和家长的信任是学校最宝贵的资产，数据安全是保护这份信任的基础"
