id: healthcare_ransomware
industry: healthcare
scenario: ransomware

pain_points:
  surface: >
    三甲医院（日均门诊8000+，床位2000+）遭受勒索软件攻击，导致HIS挂号系统中断2小时。
    5人IT团队没有专职安全人员，物理网络隔离已被证明不够——USB设备、移动终端、
    医保接口等都可能成为入侵通道。卫健委要求限期整改。
  deep: >
    医疗行业安全的核心诉求是"业务连续性"——安全方案绝不能影响HIS等核心业务系统运行。
    勒索防护和数据备份是不可妥协的硬性需求。旁路部署和热更新是赢得客户信任的关键特性。
    5人IT团队无法承担复杂安全方案的运维，需要"买了就能用、有人帮你看"的托管式服务。
    合规压力（等保三级、医疗机构网络安全管理办法）与实际安全需求形成双重负担。

solution:
  method: "勒索防护 + 业务连续性保障 + 合规整改"
  product: "EDR 终端防护 + 核心业务数据实时备份 + 接口安全网关 + 专家远程应急"
  phases:
    - >
      紧急响应阶段（旁路部署，零业务影响）：部署EDR终端防护覆盖全院，
      采用旁路模式确保HIS/LIS/PACS等核心系统零中断。同时启动核心业务数据实时备份，
      确保数据恢复时间从2小时缩短至30分钟以内。
    - >
      接口加固阶段：针对医保接口、检验查询接口等第三方对接通道部署接口安全网关，
      封堵通过外部接口入侵的路径。同时完成等保三级合规差距评估和整改方案。
    - >
      长期安全运营：提供专家远程应急服务（7分钟响应），合规咨询+整改辅助，
      释放IT团队80%的安全运维工作量，让5人团队也能保障三甲医院级别的安全。

talking_points:
  opening: >
    医疗行业正成为勒索软件的头号目标——攻击者知道医院不能停机，所以赎金要求越来越高。
    我们帮助医疗机构在不影响任何业务系统运行的前提下，建立从勒索防护到数据备份的完整防线，
    同时满足等保三级和卫健委的合规要求。
  empathy: >
    我们理解医院IT团队的压力——5个人要保障8000+日门诊量的系统运行，
    还要应对安全合规要求，这几乎是不可能完成的任务。我们的方案专门为此设计：
    旁路部署不影响业务、自动化运维不增加工作量、专家远程兜底让您不是一个人战斗。
  anchoring: >
    我们的医疗行业客户实现了勒索拦截率99%+、数据恢复时间从2小时缩短至30分钟以内（4倍提升）、
    安全事件7分钟专家远程响应、顺利通过等保三级评审、IT团队安全运维工作量释放80%。

sensitivity:
  - "绝不能影响诊疗业务——安全方案的所有部署必须零中断，旁路部署是核心卖点"
  - "不要提及医院曾经被攻击的具体细节——用'同类医疗机构'的案例替代"
  - "设备兼容性极其敏感——老旧医疗设备（如PACS影像设备）不能有任何影响"
  - "合规（等保三级）是刚需但非首要——业务连续性永远排在合规前面"

follow_up_questions:
  - dimension: environment
    question: "HIS、LIS、PACS等核心系统分别是什么厂商？是否有物理网络隔离？"
  - dimension: environment
    question: "有多少终端需要防护？操作系统版本分布如何？是否有老旧XP/Win7设备？"
  - dimension: time
    question: "卫健委整改的deadline是什么时候？等保评审计划什么时候进行？"
  - dimension: time
    question: "核心业务系统有维护窗口吗？还是必须7x24不间断运行？"
  - dimension: asset
    question: "目前有哪些安全设备？防病毒软件覆盖了多少终端？"
  - dimension: asset
    question: "数据备份目前是怎么做的？HIS数据库是否有实时备份？"
  - dimension: budget
    question: "我们有基础防护方案（EDR+备份，约15-25万）和全面防护方案（含接口网关+远程运营，约40-60万），院里更倾向哪个方向？"

reference_event: >
  某三甲综合医院（日均门诊8000+，床位2000+，HIS/LIS/PACS系统）遭受勒索软件攻击，
  HIS挂号服务中断2小时。5人IT团队无专职安全人员，物理隔离被USB等通道绕过。
  通过旁路部署EDR+实时数据备份+接口安全网关+专家远程应急，
  实现勒索拦截率99%+、数据恢复≤30分钟、7分钟应急响应、通过等保三级评审、
  IT团队安全运维工作量释放80%。
