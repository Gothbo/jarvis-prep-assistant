id: retail_ransomware
industry: retail
scenario: ransomware

pain_points:
  surface: >
    全国连锁便利店品牌（上万家门店、仅3人IT团队）面临安全运营困境：
    3个人要保障上万家门店的信息安全，节假日是最焦虑的时段（无人值守监控），
    告警过载无法判断优先级，没有跨门店的统一管理视图。
    传统防火墙和杀毒软件已无法应对新型威胁。
  deep: >
    对于连锁/多分支且IT人员极少的客户，轻量级MSS（安全托管服务）是最佳模式。
    云端管理+门店零部署是核心卖点——上万家门店不可能逐一部署安全方案。
    用数字（95%工作量释放、500+事件闭环、7分钟响应）说话比技术参数更有说服力。
    安全不是IT团队的本职工作，他们应该专注于业务系统而非安全运维。

solution:
  method: "MSS安全托管 + 云端统一运营 + 门店零部署"
  product: "MSS 安全托管服务（7x24云端运营）+ 云端安全运营平台（SaaS）"
  phases:
    - >
      快速接入阶段（门店零部署）：云端SaaS安全运营平台接入，门店端无需任何硬件或软件部署。
      通过现有网络架构接入MSS服务，实现上万家门店的统一安全覆盖。
    - >
      安全运营接管：MSS安全专家团队7x24监控，替代IT团队承担安全告警分析、
      事件处理和应急响应工作。IT团队的安全工作量从95%降至5%。
    - >
      持续优化：年均500+安全事件闭环处理，平均7分钟事件响应时间（从小时级缩短），
      定期安全报告和优化建议。节假日也不再需要IT人员值守。

talking_points:
  opening: >
    连锁企业的安全挑战在于规模——上万家门店不可能逐一部署安全方案，
    3个人的IT团队也不可能7x24监控所有安全告警。MSS安全托管让专业安全团队帮您看，
    门店零部署、云端统一管理，您的IT团队可以专注做业务。
  empathy: >
    3个人管上万门店的安全，这不现实——没有人能做好。
    问题不是您的团队不够努力，而是这个工作量本来就不应该由3个人来承担。
    MSS托管就是让专业的安全团队来做安全的事，您的团队只需要做他们最擅长的业务IT。
  anchoring: >
    我们的连锁零售客户（真实案例）实现了IT团队安全工作量从95%降至5%（释放90%）、
    平均7分钟事件响应（从小时级）、年均500+安全事件闭环处理、
    100%门店统一安全覆盖。节假日IT团队终于可以放心休假了。

sensitivity:
  - "统一管理是第一敏感度——上万门店必须一个平台看全部"
  - "单店部署必须极轻量甚至零部署——不可能派人去每个门店安装"
  - "边际成本极其敏感——新开一家门店的安全成本必须趋近于零"
  - "不要用技术术语——3人IT团队需要的是'有人帮我看'而非'EDR+XDR+SOC'"

follow_up_questions:
  - dimension: environment
    question: "门店的网络架构是怎样的？是否有统一的SD-WAN或VPN连接？门店使用什么POS系统？"
  - dimension: environment
    question: "总部IT团队除了安全还负责哪些工作？是否有分店IT支持人员？"
  - dimension: time
    question: "是否有即将开业的新门店计划？扩张速度大约是多少？"
  - dimension: time
    question: "过去是否发生过安全事件？最近一次安全告警是什么时候？"
  - dimension: asset
    question: "每家门店大约有多少台终端设备？是否有服务器还是纯云端？"
  - dimension: asset
    question: "目前的安全设备部署在总部还是门店？是否有集中管理？"
  - dimension: budget
    question: "安全预算是按年运营费用还是按项目投入？MSS按月/年付费模式是否可接受？"

reference_event: >
  美宜佳便利店（全国上万家门店、3人IT团队）采用深信服MSS安全托管服务，
  实现7x24云端安全运营、门店零部署、IT团队安全工作量从95%降至5%（释放90%）、
  平均7分钟事件响应、年均500+安全事件闭环处理、100%门店统一覆盖。
  真实案例来源：深信服官方案例库（2024年）。
