id: government_compliance
industry: government
scenario: compliance

pain_points:
  surface: >
    某市大数据局运营政务云平台，服务80+个委办局（500+虚拟机、日均20万+市民服务）。
    省级安全检查发现多个高危漏洞和各委办局安全水平参差不齐。3人安全团队无法逐一管理80个单位。
    已有安全资源池投资必须保留，不能推倒重来。
  deep: >
    政务安全遵循"管理驱动"逻辑——技术方案必须配合行政机制（排名通报、考核问责）才能落地。
    领导可见的安全评分是最强大的推动力。80个委办局不可能逐一管理，
    需要的是"一个平台看全局+评分排名促整改"的管理型方案。
    已有投资必须保留（不能否定前任决策），在存量基础上增强是最优路径。

solution:
  method: "统一安全管理 + 安全评分排名 + 存量安全资源池增强"
  product: "统一安全管理平台 + 自动化漏洞扫描与整改跟踪 + MSS安全托管"
  phases:
    - >
      全局可见阶段：部署统一安全管理平台，接入现有安全资源池（防火墙、WAF、堡垒机），
      实时展示80个委办局安全评分。不替换已有设备，而是在其之上建立统一管理层。
    - >
      整改推动阶段：自动化漏洞扫描+整改工单派发+闭环跟踪，平均7天完成整改。
      安全评分排名通报机制——领导看到排名自然推动下属单位整改。
    - >
      持续运营阶段：MSS安全托管释放70%运维工作量，3人团队也能管理80个委办局的安全。
      下次省级检查零高危漏洞。

talking_points:
  opening: >
    政务云平台面临的安全挑战不只是技术问题，更是管理问题——80个委办局的安全水平参差不齐，
    而3人团队不可能逐一管理。我们帮助政务云建立'一个平台看全局、评分排名促整改'的管理型安全体系，
    在不替换已有投资的前提下，让安全管理变得可见、可量化、可推动。
  empathy: >
    我们理解政务云的特殊处境——80个委办局各有各的系统、各有各的供应商，
    3个人不可能事必躬亲。而且前任的投资不能说推翻就推翻。
    我们的方案专门为此设计：在已有安全资源池上加一层统一管理，用评分排名让各委办局主动整改，
    而不是您去催每个人。
  anchoring: >
    我们的政务云客户实现了80个委办局安全评分实时可见、漏洞整改平均7天闭环、
    MSS托管释放70%运维工作量、下次省级检查零高危漏洞。
    更重要的是，评分排名机制让安全管理从'安全团队催着改'变成'各委办局主动改'。

sensitivity:
  - "实施时间线是第一敏感度——领导关注'什么时候能看到效果'，要有明确的里程碑"
  - "不能否定前任的安全投资——强调'在现有基础上增强'而非'之前的方案有问题'"
  - "透明度和可审计性——所有安全数据必须可导出、可汇报、可追溯"
  - "合规是底线但不是卖点——不要说'帮您过检'而要说'建立持续的安全管理能力'"

follow_up_questions:
  - dimension: environment
    question: "现有安全资源池包含哪些设备？品牌和型号？是否有统一管理平台？"
  - dimension: environment
    question: "80个委办局中有多少已经接入了安全资源池？有多少还在独立运行？"
  - dimension: time
    question: "下次省级安全检查预计什么时候？是否有其他考核节点？"
  - dimension: time
    question: "项目从立项到验收的预期周期是多长？"
  - dimension: asset
    question: "政务云平台总共多少台虚拟机和物理服务器？各委办局系统是否有等级保护定级？"
  - dimension: asset
    question: "目前3人团队的日常工作内容是什么？是否有外包团队协助？"
  - dimension: budget
    question: "项目预算是纳入信息化建设还是单独的安全专项？是否有上级转移支付或专项资金？"

reference_event: >
  某市大数据局政务云平台（80+委办局、500+虚拟机、日均20万+市民服务），
  省级安全检查发现多个高危漏洞，安全水平参差不齐。3人安全团队无法逐一管理。
  通过部署统一安全管理平台（利用现有安全资源池）+自动化漏洞扫描与整改跟踪+
  安全评分排名通报机制+MSS安全托管，实现80个委办局安全评分实时可见、
  整改平均7天闭环、释放70%运维工作量、下次检查零高危漏洞。
