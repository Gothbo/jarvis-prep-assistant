id: manufacturing_apt
industry: manufacturing
scenario: apt

pain_points:
  surface: >
    汽车零部件制造商（3个生产基地、500+工控设备、年产值20亿+）遭受PLC篡改攻击，
    生产参数被修改导致2000件产品报废。IT/OT网络融合后安全没有同步融合，
    OT侧几乎无防护。主机厂要求通过TISAX认证，否则可能丢失订单。
  deep: >
    制造业安全的核心诉求是"产线不能停"——安全方案绝不能影响生产线运行。
    ICS协议深度解析（OPC、Modbus、S7）和IT/OT统一管理是关键差异化能力。
    IT团队不懂工控系统，OT侧没有安全人员——需要的是能桥接IT和OT的安全方案。
    TISAX认证是商业刚需（没有认证就没有订单），但安全整改必须在不停产的前提下完成。

solution:
  method: "工控安全监测 + IT/OT边界防护 + TISAX合规咨询"
  product: "ICS安全监测探针（旁路部署）+ IT/OT边界防火墙 + 工控资产自动发现"
  phases:
    - >
      资产发现阶段（旁路部署，零产线影响）：部署ICS安全监测探针，旁路接入OT网络，
      自动发现500+工控设备并生成拓扑图。识别所有IT/OT边界接入点。
    - >
      边界加固阶段：在IT/OT边界部署工业防火墙，配置基于ICS协议（OPC/Modbus/S7）的
      深度包检测策略。实时监测OT网络异常行为，秒级告警。
    - >
      合规认证阶段：提供TISAX合规咨询和整改辅助，6个月内通过认证。
      建设IT/OT统一安全管理平台，IT团队可以在同一平台上监控OT安全态势。

talking_points:
  opening: >
    制造业的IT/OT融合带来了效率提升，但也带来了安全风险——OT网络从封闭走向开放，
    攻击者可以利用IT侧的入口渗透到产线。我们帮助制造企业在不影响任何生产运行的前提下，
    建立从IT到OT的完整安全可见性和防护能力。
  empathy: >
    我们理解制造业的特殊性——IT团队不懂PLC和SCADA，OT工程师不懂网络安全，
    而主机厂的TISAX认证要求又迫在眉睫。我们的方案专门为桥接IT和OT设计：
    旁路部署不影响产线、自动发现工控资产、IT团队在统一平台上就能看到OT安全状态。
  anchoring: >
    我们的制造业客户实现了OT资产100%自动发现（500+设备+拓扑图）、
    实时异常监测秒级告警、部署后OT侧零安全事件、6个月内通过TISAX认证、
    IT/OT统一管理平台让IT团队也能看懂OT安全。

sensitivity:
  - "产线绝对不能停——任何安全部署都必须零影响，旁路部署是唯一可接受的方式"
  - "不要使用IT安全术语——OT工程师听不懂'零信任'和'XDR'，用'产线防护'和'设备安全'"
  - "老旧PLC设备兼容性极其敏感——不能有任何影响生产效率和产品质量的风险"
  - "TISAX认证是商业刚需但不要用恐惧营销——用'帮您顺利通过认证'而非'不认证就丢订单'"

follow_up_questions:
  - dimension: environment
    question: "工控系统使用哪些厂商的PLC和SCADA？（西门子/三菱/欧姆龙/ABB等）通信协议是什么？"
  - dimension: environment
    question: "IT和OT网络目前是如何隔离的？是物理隔离还是逻辑隔离？有哪些跨域接入点？"
  - dimension: time
    question: "TISAX认证的deadline是什么时候？主机厂给了多长时间的整改期？"
  - dimension: time
    question: "产线有停机维护窗口吗？还是全年不间断运行？"
  - dimension: asset
    question: "OT网络中大约有多少台工控设备？是否有完整的资产清单？"
  - dimension: asset
    question: "IT团队和OT团队分别有多少人？是否有交叉了解对方系统的人员？"
  - dimension: budget
    question: "我们有基础监测方案（ICS探针+边界防火墙，约20-35万）和全面方案（含统一平台+TISAX咨询，约50-80万），厂里更倾向哪个方向？"

reference_event: >
  某汽车零部件制造商（3个生产基地、500+工控设备、年产值20亿+）遭受PLC篡改攻击，
  生产参数被修改导致2000件产品报废。IT/OT融合后安全未同步，OT侧几乎无防护。
  主机厂要求TISAX认证。通过旁路部署ICS安全监测探针+IT/OT边界防火墙+
  自动资产发现+TISAX合规咨询，6个月内通过认证，部署后OT侧零安全事件。
