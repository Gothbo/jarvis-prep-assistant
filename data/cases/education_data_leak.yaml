id: education_data_leak
industry: education
scenario: data_leak

pain_points:
  surface: >
    在线教育公司（300+服务器、60+开发、2人安全团队）的一个未鉴权调试API被遗留在生产环境，
    导致30万+用户数据泄露。CEO要求一个月内完成整改，而新课程平台下季度就要上线。
    2人安全团队疲于应对，既要处理事件又要支撑新平台安全上线。
  deep: >
    教育行业安全的核心矛盾不是"缺产品"，而是"开发流程中缺少安全检查环节"。
    业务迭代速度快，安全必须跟上节奏——修复根因（认证/流程）比推荐DLP等产品更重要。
    2人安全团队不可能覆盖60+开发者的所有代码，需要的是流程化的安全检查机制，
    而非更多需要人工操作的安全工具。事件根因是开发流程问题，不是产品缺口。

solution:
  method: "紧急止血 + API安全治理 + 开发安全流程建设"
  product: "API安全扫描 + DLP数据防泄露（可选）+ MSS安全托管（可选）"
  phases:
    - >
      紧急止血阶段（1-3天）：远程封堵泄露API，发现其他暴露的API接口，
      出具数据安全事件应急响应报告。优先修复根因（API认证问题），而非推销产品。
    - >
      全面排查阶段（3-7天）：API资产全量盘点+漏洞扫描，按风险等级标记所有API，
      输出API安全风险清单和修复优先级排序。建立开发-测试-生产安全检查工作流。
    - >
      长期建设（可选）：部署API安全网关、DLP数据防泄露、MSS安全托管服务，
      让2人安全团队也能覆盖全量安全运营。

talking_points:
  opening: >
    在线教育行业业务迭代快，开发团队在赶进度的过程中难免留下安全隐患——
    这不是某个人的问题，而是流程问题。我们帮助教育企业在保持业务速度的同时，
    建立轻量级的安全检查机制，让安全不成为瓶颈而是护栏。
  empathy: >
    2个人要管300台服务器和60个开发者的安全，这个工作量是不现实的。
    我们不会建议您再加人——而是帮您用流程化和自动化的方式，
    让有限的人力发挥最大的安全效果。先解决当前的紧急问题，再谈长期建设。
  anchoring: >
    我们的教育行业客户通常能在1-3天内完成紧急止血（封堵泄露通道+发现其他暴露API），
    3-7天完成全量API资产盘点和风险分级，最终建立起开发-测试-生产的安全检查工作流，
    从根源上防止类似事件再次发生。

sensitivity:
  - "预算/性价比是第一敏感度——教育行业预算有限，必须证明投入产出比"
  - "不能影响教学/业务系统运行——安全部署必须轻量、无感知"
  - "IT团队通常很小——方案必须简单易运维，或提供托管服务"
  - "合规（等保）是刚需但非紧急——先解决事件再谈合规"

follow_up_questions:
  - dimension: environment
    question: "业务系统是自研还是第三方？部署在哪个公有云上？开发框架是什么？"
  - dimension: environment
    question: "API是否有统一的管理网关？开发-测试-生产环境是否隔离？"
  - dimension: time
    question: "事件整改的deadline是什么时候？新平台上线时间能否调整？"
  - dimension: time
    question: "是否有即将到来的合规评估或检查？"
  - dimension: asset
    question: "目前有多少API接口在生产环境运行？是否有完整的API资产清单？"
  - dimension: asset
    question: "安全团队2个人的分工是什么？是否有其他IT人员可以协助安全运营？"
  - dimension: budget
    question: "我们有应急服务（单次事件处理，约1-3万）和长期托管（MSS月付，约5000-8000/月）两种模式，您更关注解决当前问题还是长期保障？"

reference_event: >
  某在线教育公司（300+服务器、60+开发者、2人安全团队）因一个未鉴权的调试API
  被遗留在生产环境，导致30万+用户数据泄露。事件根因是开发流程缺少安全检查环节。
  通过紧急止血（1-3天封堵）+API安全治理（3-7天全量盘点）+开发安全流程建设，
  建立了dev-test-prod安全检查工作流，从根源上解决问题。
