id: finance_data_leak
industry: finance
scenario: data_leak

pain_points:
  surface: >
    城商行（总部+120个支行、2000+服务器）收到银保监会数据安全合规整改通知，
    要求3个月内完成整改。数据分类分级不清晰，测试环境使用真实客户数据，
    120个支行无安全人员。8人安全团队（总部）无法覆盖全部分支机构。
  deep: >
    金融行业安全遵循"合规优先"逻辑——每个方案组件都必须映射到具体的监管条款。
    "总部-分支统一管理"是区别于只提供单机DLP产品的竞争对手的关键差异化能力。
    120个支行的安全覆盖不可能靠派人出差完成，必须通过统一管理平台远程覆盖。
    测试环境使用真实数据是行业通病但监管零容忍——数据脱敏是不可妥协的要求。

solution:
  method: "合规驱动的数据安全治理 + 总分支统一管理"
  product: "数据资产盘点服务 + DLP 数据防泄露 + 数据库审计增强 + 统一安全管理平台"
  phases:
    - >
      数据资产盘点（2周）：全面梳理数据资产，建立分类分级标签体系。
      明确哪些数据在哪里、谁在用、风险在哪里。这是所有后续工作的基础。
    - >
      合规整改部署：在总部和120个支行统一部署DLP策略，测试环境100%数据脱敏，
      增强现有数据库审计设备的策略配置。所有策略通过统一管理平台远程下发，无需逐支行出差。
    - >
      持续运营：MSS安全托管服务释放60%运维工作量，总部8人团队通过统一管理平台
      实时掌握120个支行的数据安全态势。3个月内通过监管验收。

talking_points:
  opening: >
    金融行业的数据安全合规要求越来越严格——银保监会的整改通知不是建议而是命令。
    我们帮助银行机构在监管期限内完成从数据资产盘点到全面合规的完整闭环，
    特别是解决'总部能管但支行管不到'的覆盖性问题。
  empathy: >
    我们理解银行安全团队的处境——8个人要覆盖总部加120个支行的数据安全，
    还要在3个月内完成监管整改。这不是人手的问题，是方法论和工具的问题。
    我们的方案核心是'统一管理+远程覆盖'，让您不需要跑120个支行也能完成整改。
  anchoring: >
    我们的金融行业客户通常在2周内完成数据资产全量盘点和分类分级，
    100%测试数据脱敏，120个支行100%统一纳管，MSS托管释放60%运维工作量，
    3个月内顺利通过监管验收。

sensitivity:
  - "数据安全是金融行业的命脉——任何方案都必须首先证明数据保护的可靠性"
  - "合规条款的精确映射——每个产品功能都要能对应到具体的监管要求"
  - "不要暗示当前存在合规缺陷——用'增强合规覆盖'而非'修补合规漏洞'"
  - "审计追溯能力是隐性刚需——所有安全操作必须可审计、可追溯"

follow_up_questions:
  - dimension: environment
    question: "目前数据分类分级工作做到什么程度？是否有数据资产清单？"
  - dimension: environment
    question: "总部和支行之间的网络连接方式？是否有统一的安全管理平台？"
  - dimension: time
    question: "监管整改的精确deadline是什么时候？验收标准是什么？"
  - dimension: time
    question: "未来12个月内是否有其他新的监管要求需要同时考虑？"
  - dimension: asset
    question: "目前部署了哪些安全设备？数据库审计覆盖了哪些核心系统？"
  - dimension: asset
    question: "测试环境有多少套？使用真实数据的比例大约是多少？"
  - dimension: budget
    question: "整改预算是列入合规专项还是IT运维？是否需要考虑分阶段投入？"

reference_event: >
  某城商行（总部+120支行、2000+服务器、8人安全团队）收到银保监会数据安全合规整改通知，
  3个月限期。数据分类分级不清、测试环境使用真实数据、支行无安全人员。
  通过2周数据资产盘点+DLP统一部署+数据库审计增强+统一管理平台+MSS托管，
  实现100%测试数据脱敏、120支行100%纳管、释放60%运维量、3个月通过监管验收。
