id: retail_data_leak
industry: retail
scenario: data_leak

pain_points:
  surface: >
    中型零售集团线上线下业务频繁遭受攻击，电商平台出现数据篡改和恶意刷单现象。
    虽然已部署 WAF 和 IPS 设备，但安全设备日志各自独立，无法追溯攻击入口和路径。
    老板要求一周内给出调查结果，IT 团队压力巨大。
  deep: >
    零售行业安全的核心矛盾不是"要不要买设备"，而是"已有设备如何协同形成威胁可见性"。
    安全设备运行在信息孤岛中，日志缺乏关联分析能力，每天产生数万条告警却无人能判断哪些是真实威胁。
    从合规驱动转向效果驱动的安全转型迫在眉睫——客户已经投入了安全设备预算，不愿再盲目追加投资。

solution:
  method: "紧急溯源分析 + 安全设备协同优化"
  product: "XDR 扩展检测响应 + SIP 安全感知平台 + WAF 策略调优"
  phases:
    - >
      紧急溯源阶段（2-3天）：部署专家远程服务，对现有安全设备日志进行全量采集和关联分析，
      快速定位攻击入口、攻击路径和影响范围。首日出结果：发现4台被入侵服务器，其中2台已植入后门。
    - >
      针对性加固阶段（3-5天）：基于溯源结果对 WAF 策略进行精准调优，更新 IPS 规则库，
      实现轻量级日志统一采集。告警噪音从日均3万条降至40条高优先级告警，降噪率99.8%。
    - >
      长期安全运营（可选）：部署 XDR + SIP 平台实现全自动化安全运营，
      与现有安全设备双向集成，形成从检测到响应的闭环能力。6个月累计拦截200万+次扫描和攻击。

talking_points:
  opening: >
    零售行业正面临线上线下融合带来的安全挑战——攻击者不会因为你已经买了安全设备就停止攻击，
    关键在于让已有设备真正协同工作，形成从威胁发现到快速响应的完整能力。
    我们帮助零售客户在不大幅增加预算的前提下，把碎片化的安全设备变成统一的安全防线。
  empathy: >
    我们理解零售企业IT团队的处境——既要保障线上交易不中断，又要应对日益复杂的攻击手段，
    而老板往往只看到"买了设备还被攻击"的结果。您已经做了正确的第一步投资，
    现在需要的是让这些投资发挥协同价值，而不是推倒重来。
  anchoring: >
    我们的零售行业客户通常在溯源阶段就能将攻击定位时间从数天缩短至3天（提升70%），
    告警噪音降低99.8%，让IT团队从"每天看3万条告警"变成"每天处理40条精准告警"。
    核心转变是：从"有没有安全设备"到"安全设备能不能协同作战"。

sensitivity:
  - "绝不能影响销售业务——安全方案必须零感知，不影响交易流程和客户体验"
  - "支付安全（PCI DSS合规）是硬性要求，但要用业务语言而非合规语言沟通"
  - "不要否定客户已有的安全投资——强调'让现有设备更好用'而非'你的设备不行'"
  - "老板关注的是'投入产出比'，用量化的数字（降噪99.8%、3天出结果）而非技术术语"

follow_up_questions:
  - dimension: environment
    question: "目前部署了哪些安全设备？品牌和型号是什么？设备之间的日志是否有关联？"
  - dimension: environment
    question: "电商平台是自研还是第三方SaaS？部署在公有云还是自建机房？"
  - dimension: time
    question: "这次事件的调查deadline是什么时候？老板期望的交付物是报告还是完整整改？"
  - dimension: time
    question: "是否有即将到来的促销季（如618/双11）需要在之前完成加固？"
  - dimension: asset
    question: "目前WAF和IPS的日均告警量大概是多少？是否有专人负责告警分析？"
  - dimension: asset
    question: "安全团队是专职还是兼职？几个人负责整体安全运营？"
  - dimension: budget
    question: "我们有两个方向：A方案（优化现有设备+溯源服务，约2-3万）和B方案（全量XDR+感知平台，约10-15万），您更倾向哪个方向？"

reference_event: >
  某中型零售集团电商事业部遭受持续性攻击，电商平台出现数据篡改和恶意刷单。
  已部署的 WAF 和 IPS 设备各自产生大量告警但无法关联分析，安全团队无法追溯攻击路径。
  通过部署紧急溯源服务+安全设备协同优化，首地发现4台被入侵服务器（2台有后门），
  告警降噪99.8%（3万/天→40条），6个月累计拦截200万+次攻击。
