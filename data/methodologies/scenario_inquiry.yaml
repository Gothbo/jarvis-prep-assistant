id: scenario_inquiry
name: "场景化询问顺序"
description: >
  根据客户当前情绪状态和场景调整提问顺序的框架。定义三种场景——危机（焦虑/紧急）、
  常规（理性/计划中）、探索（好奇/浏览中）——每种场景有不同的提问流程、深度和沟通重点。
  核心洞察：询问顺序必须匹配客户心理状态，不能套用固定模板。
  焦虑？先止血再诊断。理性？先诊断再开方。观望？先给价值再跟进。
applicable_scenarios:
  - ransomware
  - data_leak
  - apt
steps:
  - order: 1
    title: "识别客户场景类型"
    description: "通过关键词和信号判断客户属于危机、常规还是探索场景"
    key_actions:
      - "危机信号：'已经出事''老板怒了''一周内''整改'→你是救火队员"
      - "常规信号：'想优化''正在评估''计划上线'→你是方案顾问"
      - "探索信号：'想了解一下''能介绍吗''你们有什么产品'→你是信息提供者"
  - order: 2
    title: "危机场景：先止血后诊断"
    description: "客户焦虑紧急时，精简提问，快速给出初步框架"
    key_actions:
      - "只问3-5个关键问题（分散在各阶段）"
      - "痛点转化→共情锚定→1-2个关键问题→初步框架→补充问题→明确承诺"
      - "给初步方案框架+承诺细化，不在信任建立前谈预算"
  - order: 3
    title: "常规场景：先诊断后开方"
    description: "客户理性计划中时，完整提问，给出精确方案"
    key_actions:
      - "一次问5-8个问题（四维全覆盖）"
      - "痛点转化→共情→环境问题→时间问题→资产问题→完整方案→预算"
      - "给出完整精确方案，预算在方案后通过套餐选择引出"
  - order: 4
    title: "探索场景：先给价值再跟进"
    description: "客户好奇观望时，轻量互动，不急于推销"
    key_actions:
      - "只问1-2个轻量级问题"
      - "价值展示→1-2个轻问题→方向性建议→创造跟进理由"
      - "只给方向性建议不出具体方案，绝不谈预算"
  - order: 5
    title: "动态切换"
    description: "对话过程中根据客户反应灵活切换场景类型"
    key_actions:
      - "探索中发现紧急需求→切换到危机模式"
      - "危机中客户放松下来→切换到常规模式"
      - "始终保持对客户情绪状态的敏感度"
industry_match:
  - finance
  - healthcare
  - manufacturing
  - government
  - education
  - retail
