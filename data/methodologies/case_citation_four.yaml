id: case_citation_four
name: "案例引用四法"
description: >
  售前案例引用的实用指南——如何在不造假的前提下有说服力地引用案例。
  四种方法：(1)模糊化处理——用真实场景/数据/结果但隐去客户名称；
  (2)组合本库案例——从多个真实案例中组合元素；
  (3)诚实说回去查——"让我查一下类似项目数据，下周给您发材料"；
  (4)用行业认知替代——用白皮书和行业统计数据替代具体客户故事。
  黄金法则：宁可不引用也不要引用错误的案例；模糊化+真实场景+真实结果=正当引用而非造假；
  诚实（"回去查"）比现场编造好100倍。
applicable_scenarios:
  - compliance
  - data_leak
  - ransomware
  - apt
  - phishing
steps:
  - order: 1
    title: "模糊化处理"
    description: "'某客户'+真实场景+真实数据+真实结果"
    key_actions:
      - "不透露客户名称，但保持场景/数据/结果的真实性"
      - "公式：'我们有一个[行业]客户，遇到了[场景]，最终[量化结果]'"
      - "关键点：模糊的是身份，真实的是经历和成果"
  - order: 2
    title: "组合本库案例"
    description: "从多个真实案例中组合元素形成综合叙述"
    key_actions:
      - "每个元素都来自真实经历，但组合在一起不指向任何单一客户"
      - "公式：'在[行业A]我们做过[方案X]，在[行业B]我们做过[方案Y]，综合来看...'"
      - "避免过于具体的细节（如具体地址、具体人名）"
  - order: 3
    title: "诚实说回去查"
    description: "'让我查一下类似项目数据，下周发材料给您'"
    key_actions:
      - "展示专业性——承认不知道比瞎编好100倍"
      - "争取时间——回去后真正查找匹配案例和数据"
      - "创造天然跟进理由——'上次说给您发的材料，我整理好了'"
  - order: 4
    title: "用行业认知替代"
    description: "用行业白皮书、权威报告和统计数据替代具体客户故事"
    key_actions:
      - "引用Gartner/IDC/Frost&Sullivan等行业报告数据"
      - "公式：'根据[机构]的报告，[行业]的[问题]导致了[量化影响]'"
      - "不需要具体案例，行业共识数据就是有效弹药"
  - order: 5
    title: "案例引用黄金法则"
    description: "四条铁律，确保案例引用既有说服力又不越线"
    key_actions:
      - "宁可不引用也不要引用错误的案例"
      - "模糊化+真实场景+真实结果=正当引用，不是造假"
      - "诚实（'回去查'）100倍优于现场编造"
      - "行业白皮书数据是合法有效弹药"
industry_match:
  - finance
  - healthcare
  - manufacturing
  - government
  - education
  - retail
