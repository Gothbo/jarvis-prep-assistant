id: four_dimensional_inquiry
name: "四维追问框架"
description: >
  售前结构化提问框架，定义从客户处收集信息的四个维度：环境（系统架构）、时间（截止日期/窗口）、
  资产（现有设备）、预算（成本边界）。每个维度提供具体问题、答案对方案设计的影响、
  以及最优提问顺序——先谈技术和环境（最中性），最后谈预算（永远用套餐选择替代直接探预算）。
applicable_scenarios:
  - compliance
  - data_leak
  - ransomware
  - apt
  - phishing
steps:
  - order: 1
    title: "痛点转化"
    description: "确认对客户痛点的理解，用自己的话复述并请客户确认"
    key_actions:
      - "总结客户已表达的核心痛点"
      - "用'我理解的对吗？'请客户确认或纠正"
      - "展示你在认真倾听而非急于推销"
  - order: 2
    title: "共情锚定"
    description: "建立信任，让客户感受到你理解他的处境"
    key_actions:
      - "分享同类行业客户的相似经历"
      - "表达对客户团队努力的认可"
      - "避免否定客户当前的安全投入"
  - order: 3
    title: "环境维度（最先问）"
    description: "了解系统架构，确定方案的技术边界——自研vs第三方、云vs自建、架构类型"
    key_actions:
      - "问'系统是自研还是第三方SaaS？'——决定攻击面"
      - "问'部署在哪个云/自建机房？'——决定部署方式"
      - "问'架构是单体还是微服务？'——决定网关级控制能力"
  - order: 4
    title: "时间维度"
    description: "了解截止日期和时间窗口，决定方案节奏和分期"
    key_actions:
      - "问'交付物是报告还是完整整改？'——决定工作范围"
      - "问'是否有硬性deadline？'——决定是否需要分期（先止血再治本）"
      - "问'维护窗口是什么时候？'——决定热部署还是计划停机"
  - order: 5
    title: "资产维度"
    description: "了解现有安全设备，确定兼容性和复用可能性"
    key_actions:
      - "问'WAF是什么品牌/型号/版本？'——决定调优和日志对接能力"
      - "问'EDR覆盖率多少？'——决定主机侧取证能力"
      - "问'安全团队是专职还是兼职？几个人？'——决定工具赋能还是MSS托管"
  - order: 6
    title: "方案框架"
    description: "基于前三维度给出2-3个分层方案选项"
    key_actions:
      - "给出基础版和优化版两个方向"
      - "每个版本说明解决什么问题、投入多少资源"
      - "让客户选择方向后再细化"
  - order: 7
    title: "预算维度（最后问，用套餐选择）"
    description: "永远不要直接问预算——用方案选择替代预算探测"
    key_actions:
      - "用'A方案（基础，优化现有设备，约X万）vs B方案（全面，约Y万）'的方式引导"
      - "客户选择方向后自然暴露预算区间"
      - "永远给选择而非问数字"
industry_match:
  - finance
  - healthcare
  - manufacturing
  - government
  - education
  - retail
