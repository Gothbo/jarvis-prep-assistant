id: pyramid_response
name: "售前金字塔回应框架"
description: >
  售前行为纪律框架，覆盖沟通红线（绝对不说的话和不做的事）、针对不同受众（CIO/IT主管/采购/业务部门）
  的灵活适配、不同异议类型的应对策略、以及高级场景处理（客户夸竞品、需要汇报领导、
  不知道答案、客户突然冷淡、多个决策者意见不合）。核心心法：每次开口前问自己三个问题——
  我说的是客户想听的还是我想说的？客户能把这段话转述给他的领导吗？
  我的结束语只需要客户回答一个时间还是需要一个决定？
applicable_scenarios:
  - compliance
  - data_leak
  - ransomware
  - apt
  - phishing
steps:
  - order: 1
    title: "绝对红线——自检不说"
    description: "开口前的12项自检清单，确保不踩红线"
    key_actions:
      - "不说'其实''说实话''我不太确定但是...'等自我弱化词"
      - "不说竞品坏话、不暗示客户当前团队不行"
      - "不催单（'今天能定吗？'）、不透露底价"
      - "不打断客户、不连续说5分钟以上不互动"
  - order: 2
    title: "识别受众——调整表达"
    description: "根据对话对象调整内容重点和表达方式"
    key_actions:
      - "对CIO/VP：风险量化、TCO/ROI、同行对标→请他做向上汇报"
      - "对IT主管：技术差距、运维减负、POC验证→约POC"
      - "对采购/财务：合规刚需、3年TCO、竞品比价锚定→提供对比表"
      - "对业务部门：业务中断成本、合规处罚案例、零影响部署→约业务影响评估"
  - order: 3
    title: "金字塔结构化表达"
    description: "结论先行+论据支撑+证据佐证的三层结构"
    key_actions:
      - "结论层：一句话说清核心建议（10秒内）"
      - "论据层：2-3个支撑理由，每个30秒"
      - "证据层：案例+数据，佐证论据的真实性"
  - order: 4
    title: "异议处理——对症下药"
    description: "根据客户异议类型选择不同应对策略"
    key_actions:
      - "太贵→先证明价值差距，再谈价格"
      - "不需要→先提升客户对需求范围的认知"
      - "已有方案→揭示当前方案的盲区，迁移成本可控"
      - "需要想想→重新识别真实异议，换个角度"
  - order: 5
    title: "高级场景处理"
    description: "应对非标准场景的策略库"
    key_actions:
      - "客户夸竞品：承认+差异化+提出共存方案"
      - "需要汇报领导：帮他准备1页汇报材料"
      - "不知道答案：暂停+诚实说回去查+问清背景+当天回复"
      - "客户冷淡：不施压、输出价值（行业报告）、给台阶"
      - "多个决策者分歧：一个结论、三组分别对三人说的论据"
industry_match:
  - finance
  - healthcare
  - manufacturing
  - government
  - education
  - retail
