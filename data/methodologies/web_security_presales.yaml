id: web_security_presales
name: "Web安全技术关联售前法"
description: >
  将技术漏洞知识（XSS/SQL注入/CSRF）转化为售前场景的桥接方法论。
  对每种漏洞类型提供"客户能听懂的解释"、相关产品映射及销售话术、
  真实案例交叉引用、异议处理话术。包含"五步售前法"实操案例（以SQL注入为例）：
  痛点转化→共情锚定→方案匹配→案例佐证→反问引导。
  核心定位："我不只是会讲产品——我懂漏洞原理能跟客户技术团队对话；
  我也懂业务风险，能用客户听得懂的语言解释'为什么要买'。"
applicable_scenarios:
  - data_leak
  - apt
  - compliance
steps:
  - order: 1
    title: "漏洞→业务风险翻译"
    description: "将XSS/SQL注入/CSRF等技术术语翻译成业务影响"
    key_actions:
      - "XSS→'攻击者可以在客户浏览器里执行任意代码，窃取登录凭证和会话'"
      - "SQL注入→'攻击者可以直接读取和篡改数据库里的所有数据'"
      - "CSRF→'攻击者可以利用已登录用户的身份执行非预期操作（转账、改密码）'"
      - "永远先说'这意味着什么'，再说'技术上是怎么回事'"
  - order: 2
    title: "漏洞→产品映射"
    description: "每种漏洞类型对应推荐的安全产品组合"
    key_actions:
      - "XSS→WAF（拦截恶意脚本）+ 漏洞扫描（发现注入点）+ DLP（防止数据外泄）"
      - "SQL注入→WAF（拦截注入payload）+ 数据库审计（监控异常查询）+ 堡垒机（运维审计）"
      - "CSRF→WAF（验证请求来源）+ IAM双因素认证（防止身份冒用）"
  - order: 3
    title: "五步售前法（实操）"
    description: "完整的售前对话流程，以SQL注入为例"
    key_actions:
      - "第一步 痛点转化：'您担心的是数据库里的用户数据可能被未授权访问'"
      - "第二步 共情锚定：分享同类客户遭遇（用案例引用四法）"
      - "第三步 方案匹配：WAF+数据库审计+堡垒机的组合方案"
      - "第四步 案例佐证：量化结果（如'拦截率99%+，审计覆盖率100%'）"
      - "第五步 反问引导：'您目前数据库有多少张表涉及用户个人信息？'"
  - order: 4
    title: "异议处理"
    description: "针对Web安全场景的常见客户异议"
    key_actions:
      - "'开发会修的'→'修复需要时间，WAF在修复完成前提供即时防护'"
      - "'从来没被攻击过'→'没被攻击≠没有漏洞，只是还没被扫到'"
      - "'WAF太贵了'→'一次数据泄露的代价：罚款+赔偿+声誉损失，远超WAF投入'"
industry_match:
  - finance
  - education
  - retail
  - government
