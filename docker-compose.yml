version: "3.8"

services:
  streamlit:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - jarvis-cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - jarvis-cache:/app/cache
    restart: unless-stopped
    command: ["uvicorn", "backend_main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  jarvis-cache:
